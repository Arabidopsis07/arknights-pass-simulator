<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日方舟通行证抽盒模拟器</title>
    <!-- 引入 CSS 样式文件 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 预算输入页面，初始显示 -->
    <div id="budget-page" class="page" style="display: flex;">
        <h1>欢迎来到通行证商店</h1>
        <p>您今天的预算是？</p>
        <input type="number" id="budget-input" placeholder="输入预算" min="0" value="100">
        <button id="enter-shop">开始读博</button>
    </div>

    <!-- 主界面（商店页面），初始隐藏 -->
    <div id="shop-page" class="page" style="display: none;">

        <!-- 左侧区域：盒选择和抽卡 -->
        <div class="left-panel">
            <h1>来一发通行证吧！</h1>

            <!-- 盒子选择视图（显示所有盒子方块） -->
            <div id="box-select-view" class="view">
                <div id="box-grid" class="grid-container">
                    <!-- 动态生成的盒子方块会放在这里 -->
                </div>
            </div>

            <!-- 抽盒视图（显示当前盒的14个小方块，初始隐藏） -->
            <div id="box-detail-view" class="view" style="display: none;">
                <div class="detail-header">
                    <button id="back-to-boxes" class="back-btn">←</button>
                    <span id="detail-box-name" class="detail-box-name"></span>
                </div>
                <div id="item-grid" class="grid-container">
                    <!-- 14个小方块动态生成 -->
                </div>
                <div class="action-area">
                    <button id="draw-btn">抽一个  ¥25</button>
                    <div id="budget-warning" class="warning-text"></div>
                    <button id="new-box-btn" style="margin-top: 10px;">开新盒</button>
                </div>
            </div>

            <!-- 预算显示（公共区域） -->
            <div class="budget-info">
                剩余预算：<span id="budget-amount">0</span>
            </div>
        </div>

        <!-- 右侧背包区域 -->
        <div class="right-panel">
            <h2>我的背包</h2>
            <!-- 一键清空背包 -->
            <button id="clear-backpack-btn" style="margin-bottom: 10px;">放生所有通行证</button>
            <!-- 已抽到的通行证会以卡片形式显示在这里 -->
            <div id="drawn-container">
                <p>什么也没有</p>
            </div>
        </div>

    </div>

    <!-- 引入 JavaScript 文件 -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
